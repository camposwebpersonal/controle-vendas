<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Controle de Vendas — PMS</title>
<link rel="icon" href="img/logo_sertania.png">
<style>
:root{--bg:#080f1e;--card:#0e1729;--border:#1e3a5f;--text:#e2e8f0;--muted:#64748b;--accent:#3b82f6;--h:58px;--success:#10b981;--danger:#ef4444;--warning:#f59e0b}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}
#app{display:flex;flex-direction:column;height:100%}
#navbar{height:var(--h);background:linear-gradient(90deg,#06101f,#0a1830);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:0 20px;flex-shrink:0;position:sticky;top:0;z-index:100}
.brand{font-size:16px;font-weight:800;color:#e2e8f0;display:flex;align-items:center;gap:8px}
.brand img{height:30px;object-fit:contain}
.spacer{flex:1}
.user-chip{display:flex;align-items:center;gap:8px;background:#0e1729;border:1px solid var(--border);border-radius:20px;padding:5px 14px 5px 8px}
.user-chip .av{width:26px;height:26px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.user-chip span{font-size:12px;font-weight:600;color:#94a3b8}
.btn-logout{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.25);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer}
.btn-logout:hover{background:rgba(239,68,68,.22)}
#navmenu{background:#060e1c;border-bottom:1px solid var(--border);display:flex;gap:2px;padding:0 16px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.nav-btn{background:none;border:none;color:var(--muted);font-size:13px;font-weight:600;padding:10px 16px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
main{flex:1;overflow-y:auto}
#content{padding:clamp(14px,2.5vw,36px)}
.page-title{font-size:clamp(18px,2.2vw,28px);font-weight:800;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:20px}
.stats-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;min-width:100px;flex:1}
.stat-val{font-size:24px;font-weight:800}
.stat-lbl{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:4px}
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:12px;background:var(--card)}
table{width:100%;border-collapse:collapse}
th{background:#0a1222;color:#94a3b8;padding:10px 14px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:10px 14px;border-bottom:1px solid #1e293b;font-size:13px;vertical-align:middle}
tr:hover td{background:rgba(59,130,246,.04)}
.btn-action{background:linear-gradient(135deg,var(--accent),#2563eb);color:#fff;border:none;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer}
.btn-action.secondary{background:var(--card);border:1px solid var(--border);color:var(--text)}
.btn-action.danger{background:linear-gradient(135deg,#dc2626,#991b1b)}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:14px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:16px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)}
.modal-title{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:0 4px}
.modal-body{padding:20px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
.form-group label{font-size:12px;font-weight:600;color:#94a3b8}
.form-group input,.form-group select,.form-group textarea{padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:#0f172a;color:var(--text);font-size:13px;font-family:inherit}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.toast-item{position:fixed;top:16px;right:16px;z-index:2000;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:toastIn .3s ease}
.toast-item.success{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.3)}
.toast-item.error{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3)}
@keyframes toastIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.login-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#070b14,#0a1222)}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px;max-width:380px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.login-box img{height:60px;margin-bottom:20px}
.login-box h1{font-size:22px;margin-bottom:6px}
.login-box p{color:var(--muted);font-size:13px;margin-bottom:24px}
.login-box input{width:100%;padding:12px 16px;margin-bottom:12px;border:1px solid var(--border);border-radius:10px;background:#0f172a;color:var(--text);font-size:14px}
.login-box button{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),#2563eb);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filter-bar input,.filter-bar select{padding:7px 12px;border:1px solid var(--border);border-radius:8px;background:#0f172a;color:var(--text);font-size:13px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-pendente{background:rgba(245,158,11,.12);color:var(--warning)}
.badge-pago{background:rgba(16,185,129,.12);color:var(--success)}
.badge-entregue{background:rgba(59,130,246,.12);color:var(--accent)}
.badge-cancelado{background:rgba(239,68,68,.12);color:var(--danger)}
.venda-item-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:8px;padding:10px;background:#0a1222;border-radius:8px;border:1px solid #1e3a5f}
.venda-item-row select,.venda-item-row input{flex:1}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app" style="display:none">
  <nav id="navbar">
    <div class="brand" style="font-size:24px">🛒 <span style="font-size:16px">CONTROLE DE VENDAS</span></div>
    <div class="spacer"></div>
    <div class="user-chip"><div class="av" id="u-av">?</div><span id="u-name">…</span></div>
    <button class="btn-logout" onclick="doLogout()">Sair</button>
  </nav>
  <div id="navmenu">
    <button class="nav-btn active" id="nav-dash" onclick="setView('dash')">📊 Dashboard</button>
    <button class="nav-btn" id="nav-prod" onclick="setView('prod')">📦 Produtos</button>
    <button class="nav-btn" id="nav-cli" onclick="setView('cli')">👥 Clientes</button>
    <button class="nav-btn" id="nav-vendas" onclick="setView('vendas')">🛒 Vendas</button>
    <button class="nav-btn" id="nav-rel" onclick="setView('rel')">📈 Relatórios</button>
  </div>
  <main><div id="content"></div></main>
</div>
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div style="font-size:60px;margin-bottom:10px">🛒</div>
    <h1>Controle de Vendas</h1>
    <p>Gerencie seus produtos, clientes e vendas</p>
    <input type="email" id="loginEmail" placeholder="E-mail">
    <input type="password" id="loginSenha" placeholder="Senha">
    <button onclick="doLogin()">Entrar</button>
    <div style="margin-top:12px;font-size:12px;color:var(--muted)">Não tem conta? <a href="#" onclick="doRegister()" style="color:var(--accent)">Criar conta</a></div>
  </div>
</div>
<div class="modal-overlay" id="modal-ov" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-head"><div class="modal-title" id="modal-ttl"></div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>
<div id="toast"></div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
import{getAuth,onAuthStateChanged,signInWithEmailAndPassword,signOut,createUserWithEmailAndPassword}from"https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js";
import{getFirestore,collection,doc,addDoc,updateDoc,deleteDoc,getDocs,query,orderBy,serverTimestamp}from"https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

const FB={apiKey:"AIzaSyBoKUvcHVPsdhN3_19Vtxqm59_CRH9gVOA",authDomain:"controle-vendas-17c17.firebaseapp.com",projectId:"controle-vendas-17c17",storageBucket:"controle-vendas-17c17.firebasestorage.app",messagingSenderId:"505075319497",appId:"1:505075319497:web:c9d2f00caa18c268fc0318"};
const fbApp=initializeApp(FB);const auth=getAuth(fbApp);const db=getFirestore(fbApp);
let S={user:null,produtos:[],clientes:[],vendas:[]};let curView='dash';let _vendaItens=[];
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtN=n=>new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(Number(n)||0);
const fmtD=d=>{if(!d)return'—';try{return new Date(d).toLocaleDateString('pt-BR');}catch{return d;}};
function toast(msg,type='success',dur=3200){const el=document.createElement('div');el.className='toast-item '+type;el.textContent=msg;document.getElementById('toast').appendChild(el);setTimeout(()=>el.remove(),dur);}window.toast=toast;
const setC=h=>document.getElementById('content').innerHTML=h;

window.doLogin=async()=>{const e=document.getElementById('loginEmail').value.trim();const p=document.getElementById('loginSenha').value;if(!e||!p){toast('Preencha e-mail e senha.','error');return;}try{await signInWithEmailAndPassword(auth,e,p);}catch(err){toast(err.message,'error');}};
window.doLogout=()=>signOut(auth);
window.doRegister=async()=>{const e=document.getElementById('loginEmail').value.trim();const p=document.getElementById('loginSenha').value;if(!e||!p){toast('Preencha e-mail e senha.','error');return;}try{await createUserWithEmailAndPassword(auth,e,p);toast('Conta criada!');}catch(err){toast(err.message,'error');}};

onAuthStateChanged(auth,u=>{
  if(!u){document.getElementById('loginScreen').style.display='flex';document.getElementById('app').style.display='none';return;}
  S.user=u;document.getElementById('loginScreen').style.display='none';document.getElementById('app').style.display='flex';
  document.getElementById('u-av').textContent=(u.displayName||u.email||'?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
  document.getElementById('u-name').textContent=u.displayName||u.email.split('@')[0];
  loadAll().then(()=>setView('dash'));
});

async function loadAll(){
  const[a,b,c]=await Promise.all([
    getDocs(query(collection(db,'produtos'),orderBy('nome','asc'))),
    getDocs(query(collection(db,'clientes'),orderBy('nome','asc'))),
    getDocs(query(collection(db,'vendas'),orderBy('data','desc')))
  ]);
  S.produtos=a.docs.map(d=>({id:d.id,...d.data()}));
  S.clientes=b.docs.map(d=>({id:d.id,...d.data()}));
  S.vendas=c.docs.map(d=>({id:d.id,...d.data()}));
}

window.setView=function(v){curView=v;['dash','prod','cli','vendas','rel'].forEach(k=>{const b=document.getElementById('nav-'+k);if(b)b.classList.toggle('active',k===v);});if(v==='dash')renderDash();else if(v==='prod')renderProdutos();else if(v==='cli')renderClientes();else if(v==='vendas')renderVendas();else if(v==='rel')renderRelatorios();};
window.closeModal=function(){document.getElementById('modal-ov').style.display='none';};

function renderDash(){
  const hoje=new Date();hoje.setHours(0,0,0,0);
  const vendasHoje=S.vendas.filter(v=>{const d=new Date(v.data);d.setHours(0,0,0,0);return d.getTime()===hoje.getTime();});
  const totalHoje=vendasHoje.reduce((a,v)=>a+(Number(v.total)||0),0);
  const mesAtual=hoje.getMonth(),anoAtual=hoje.getFullYear();
  const vendasMes=S.vendas.filter(v=>{const d=new Date(v.data);return d.getMonth()===mesAtual&&d.getFullYear()===anoAtual;});
  const totalMes=vendasMes.reduce((a,v)=>a+(Number(v.total)||0),0);
  setC(`<div class="page-title">📊 Dashboard</div><div class="page-sub">Visão geral do controle de vendas</div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-val" style="color:var(--success)">${fmtN(totalHoje)}</div><div class="stat-lbl">Vendas Hoje</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--accent)">${fmtN(totalMes)}</div><div class="stat-lbl">Vendas do Mês</div></div>
      <div class="stat-card"><div class="stat-val">${S.vendas.length}</div><div class="stat-lbl">Total Vendas</div></div>
      <div class="stat-card"><div class="stat-val">${S.produtos.length}</div><div class="stat-lbl">Produtos</div></div>
      <div class="stat-card"><div class="stat-val">${S.clientes.length}</div><div class="stat-lbl">Clientes</div></div>
    </div>
    <div style="margin-bottom:18px;display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn-action" onclick="openProdutoModal()">+ Produto</button>
      <button class="btn-action" onclick="openClienteModal()">+ Cliente</button>
      <button class="btn-action" onclick="openVendaModal()">+ Venda</button>
    </div>
    <div class="page-title" style="font-size:16px;margin-top:10px">🛒 Últimas Vendas</div>
    ${renderVendasTable(S.vendas.slice(0,10))}`);
}

function renderProdutos(){
  const rows=S.produtos.map(p=>`<tr><td><strong>${esc(p.nome)}</strong></td><td>${esc(p.categoria||'—')}</td><td>${fmtN(p.preco)}</td><td>${p.estoque||0}</td>
    <td><button class="btn-action secondary" style="padding:4px 10px;font-size:11px" onclick="openProdutoModal('${p.id}')">✏️</button>
    <button class="btn-action danger" style="padding:4px 10px;font-size:11px" onclick="deleteProduto('${p.id}')">🗑️</button></td></tr>`).join('')||'<tr><td colspan="5" class="empty">Nenhum produto cadastrado.</td></tr>';
  setC(`<div class="page-title">📦 Produtos</div><div class="page-sub">Gerencie seus produtos e serviços</div>
    <div style="margin-bottom:18px"><button class="btn-action" onclick="openProdutoModal()">+ Novo Produto</button></div>
    <div class="table-wrap"><table><thead><tr><th>Nome</th><th>Categoria</th><th>Preço</th><th>Estoque</th><th>Ações</th></tr></thead><tbody>${rows}</tbody></table></div>`);
}

window.openProdutoModal=function(id){
  const p=id?S.produtos.find(x=>x.id===id):null;
  document.getElementById('modal-ttl').textContent=id?'Editar Produto':'Novo Produto';
  document.getElementById('modal-body').innerHTML=`<div class="form-grid">
    <div class="form-group full"><label>Nome</label><input id="p-nome" value="${esc(p?.nome||'')}"></div>
    <div class="form-group"><label>Categoria</label><input id="p-cat" value="${esc(p?.categoria||'')}" placeholder="Ex: Eletrônicos"></div>
    <div class="form-group"><label>Preço (R$)</label><input id="p-preco" type="number" step="0.01" value="${esc(p?.preco||'')}"></div>
    <div class="form-group"><label>Estoque</label><input id="p-est" type="number" value="${esc(p?.estoque||'0')}"></div>
    <div class="form-group full"><label>Descrição</label><textarea id="p-desc" rows="2">${esc(p?.descricao||'')}</textarea></div>
  </div><div class="modal-actions">
    <button class="btn-action secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn-action" onclick="saveProduto('${id||''}')">Salvar</button>
  </div>`;
  document.getElementById('modal-ov').style.display='flex';
};
window.saveProduto=async(id)=>{
  const data={nome:document.getElementById('p-nome').value.trim(),categoria:document.getElementById('p-cat').value.trim(),preco:Number(document.getElementById('p-preco').value)||0,estoque:Number(document.getElementById('p-est').value)||0,descricao:document.getElementById('p-desc').value.trim(),updatedAt:serverTimestamp()};
  if(!data.nome){toast('Nome é obrigatório.','error');return;}
  try{if(id){await updateDoc(doc(db,'produtos',id),data);toast('Produto atualizado!');}else{data.createdAt=serverTimestamp();await addDoc(collection(db,'produtos'),data);toast('Produto cadastrado!');}}
  catch(e){toast(e.message,'error');return;}
  closeModal();await loadAll();if(curView==='prod')renderProdutos();else renderDash();
};
window.deleteProduto=async(id)=>{if(!confirm('Excluir este produto?'))return;try{await deleteDoc(doc(db,'produtos',id));toast('Produto excluído.');await loadAll();if(curView==='prod')renderProdutos();else renderDash();}catch(e){toast(e.message,'error');}};

function renderClientes(){
  const rows=S.clientes.map(c=>`<tr><td><strong>${esc(c.nome)}</strong></td><td>${esc(c.telefone||'—')}</td><td>${esc(c.email||'—')}</td><td>${esc(c.endereco||'—')}</td>
    <td><button class="btn-action secondary" style="padding:4px 10px;font-size:11px" onclick="openClienteModal('${c.id}')">✏️</button>
    <button class="btn-action danger" style="padding:4px 10px;font-size:11px" onclick="deleteCliente('${c.id}')">🗑️</button></td></tr>`).join('')||'<tr><td colspan="5" class="empty">Nenhum cliente cadastrado.</td></tr>';
  setC(`<div class="page-title">👥 Clientes</div><div class="page-sub">Gerencie seus clientes</div>
    <div style="margin-bottom:18px"><button class="btn-action" onclick="openClienteModal()">+ Novo Cliente</button></div>
    <div class="table-wrap"><table><thead><tr><th>Nome</th><th>Telefone</th><th>E-mail</th><th>Endereço</th><th>Ações</th></tr></thead><tbody>${rows}</tbody></table></div>`);
}

window.openClienteModal=function(id){
  const c=id?S.clientes.find(x=>x.id===id):null;
  document.getElementById('modal-ttl').textContent=id?'Editar Cliente':'Novo Cliente';
  document.getElementById('modal-body').innerHTML=`<div class="form-grid">
    <div class="form-group full"><label>Nome</label><input id="c-nome" value="${esc(c?.nome||'')}"></div>
    <div class="form-group"><label>Telefone</label><input id="c-tel" value="${esc(c?.telefone||'')}"></div>
    <div class="form-group"><label>E-mail</label><input id="c-email" type="email" value="${esc(c?.email||'')}"></div>
    <div class="form-group full"><label>Endereço</label><input id="c-end" value="${esc(c?.endereco||'')}"></div>
    <div class="form-group full"><label>Observações</label><textarea id="c-obs" rows="2">${esc(c?.observacoes||'')}</textarea></div>
  </div><div class="modal-actions">
    <button class="btn-action secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn-action" onclick="saveCliente('${id||''}')">Salvar</button>
  </div>`;
  document.getElementById('modal-ov').style.display='flex';
};
window.saveCliente=async(id)=>{
  const data={nome:document.getElementById('c-nome').value.trim(),telefone:document.getElementById('c-tel').value.trim(),email:document.getElementById('c-email').value.trim(),endereco:document.getElementById('c-end').value.trim(),observacoes:document.getElementById('c-obs').value.trim(),updatedAt:serverTimestamp()};
  if(!data.nome){toast('Nome é obrigatório.','error');return;}
  try{if(id){await updateDoc(doc(db,'clientes',id),data);toast('Cliente atualizado!');}else{data.createdAt=serverTimestamp();await addDoc(collection(db,'clientes'),data);toast('Cliente cadastrado!');}}
  catch(e){toast(e.message,'error');return;}
  closeModal();await loadAll();if(curView==='cli')renderClientes();else renderDash();
};
window.deleteCliente=async(id)=>{if(!confirm('Excluir este cliente?'))return;try{await deleteDoc(doc(db,'clientes',id));toast('Cliente excluído.');await loadAll();if(curView==='cli')renderClientes();else renderDash();}catch(e){toast(e.message,'error');}};

function renderVendas(){
  const filtroStatus=document.getElementById('vf-status')?.value||'';
  const filtroCli=document.getElementById('vf-cli')?.value||'';
  let filtradas=S.vendas;
  if(filtroStatus)filtradas=filtradas.filter(v=>v.status===filtroStatus);
  if(filtroCli)filtradas=filtradas.filter(v=>v.clienteNome?.toLowerCase().includes(filtroCli.toLowerCase()));
  setC(`<div class="page-title">🛒 Vendas</div><div class="page-sub">Registre e acompanhe suas vendas</div>
    <div style="margin-bottom:10px"><button class="btn-action" onclick="openVendaModal()">+ Nova Venda</button></div>
    <div class="filter-bar">
      <select id="vf-status" onchange="renderVendas()"><option value="">Todos os status</option><option value="pendente">Pendente</option><option value="pago">Pago</option><option value="entregue">Entregue</option><option value="cancelado">Cancelado</option></select>
      <input type="text" id="vf-cli" placeholder="Buscar cliente…" oninput="renderVendas()" value="${esc(filtroCli)}">
    </div>${renderVendasTable(filtradas)}`);
}

function renderVendasTable(vendas){
  if(!vendas.length)return'<div class="empty">Nenhuma venda encontrada.</div>';
  const rows=vendas.map(v=>{
    const bc=v.status==='pago'?'badge-pago':v.status==='entregue'?'badge-entregue':v.status==='cancelado'?'badge-cancelado':'badge-pendente';
    return`<tr><td>#${v.codigo||'—'}</td><td><strong>${esc(v.clienteNome||'—')}</strong></td><td>${fmtN(v.total)}</td><td>${fmtD(v.data)}</td><td><span class="badge ${bc}">${esc(v.status||'pendente').toUpperCase()}</span></td>
    <td><button class="btn-action secondary" style="padding:4px 10px;font-size:11px" onclick="openVendaModal('${v.id}')">✏️</button>
    <button class="btn-action danger" style="padding:4px 10px;font-size:11px" onclick="deleteVenda('${v.id}')">🗑️</button></td></tr>`;
  }).join('');
  return`<div class="table-wrap"><table><thead><tr><th>Código</th><th>Cliente</th><th>Total</th><th>Data</th><th>Status</th><th>Ações</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

function refreshVendaItens(){
  const el=document.getElementById('v-itens');if(!el)return;
  let html='';
  for(let i=0;i<_vendaItens.length;i++){const it=_vendaItens[i];
    const opts=S.produtos.map(p=>`<option value="${esc(p.id)}" ${p.id===it.produtoId?'selected':''}>${esc(p.nome)} — ${fmtN(p.preco)}</option>`).join('');
    html+=`<div class="venda-item-row" id="vi-${i}"><select onchange="updateVendaItem(${i},this.value,null)"><option value="">Selecione…</option>${opts}</select><input type="number" min="1" value="${it.qtd}" placeholder="Qtd" style="width:70px" onchange="updateVendaItem(${i},null,this.value)"><input type="number" step="0.01" value="${it.preco}" placeholder="Preço unit." style="width:100px" onchange="updateVendaItem(${i},null,null,this.value)"><button class="btn-action danger" style="padding:4px 10px" onclick="removeVendaItem(${i})">×</button></div>`;
  }
  el.innerHTML=html;calcVendaTotal();
}
window.updateVendaItem=function(idx,prodId,qtd,preco){
  if(prodId){_vendaItens[idx].produtoId=prodId;const p=S.produtos.find(x=>x.id===prodId);if(p){_vendaItens[idx].nome=p.nome;_vendaItens[idx].preco=p.preco;}}
  if(qtd!==null)_vendaItens[idx].qtd=Math.max(1,Number(qtd)||1);
  if(preco!==null)_vendaItens[idx].preco=Math.max(0,Number(preco)||0);
  refreshVendaItens();
};
window.removeVendaItem=function(idx){_vendaItens.splice(idx,1);refreshVendaItens();};
window.addVendaItem=function(){_vendaItens.push({produtoId:'',nome:'',qtd:1,preco:0});refreshVendaItens();};
function calcVendaTotal(){const el=document.getElementById('v-total');if(!el)return;const t=_vendaItens.reduce((a,it)=>a+(it.qtd*it.preco),0);el.textContent=fmtN(t);}

window.openVendaModal=function(id){
  const v=id?S.vendas.find(x=>x.id===id):null;
  _vendaItens=v&&v.itens?v.itens.map(i=>({...i})):[];
  const cliOpts=S.clientes.map(c=>`<option value="${esc(c.id)}" ${v&&v.clienteId===c.id?'selected':''}>${esc(c.nome)}</option>`).join('');
  document.getElementById('modal-ttl').textContent=id?'Editar Venda':'Nova Venda';
  document.getElementById('modal-body').innerHTML=`<div class="form-grid">
    <div class="form-group full"><label>Cliente</label><select id="v-cli"><option value="">Selecione…</option>${cliOpts}</select></div>
    <div class="form-group"><label>Código</label><input id="v-cod" value="${esc(v?.codigo||'')}" placeholder="Ex: V001"></div>
    <div class="form-group"><label>Data</label><input id="v-data" type="date" value="${v&&v.data?v.data.substring(0,10):new Date().toISOString().substring(0,10)}"></div>
    <div class="form-group"><label>Status</label><select id="v-status"><option value="pendente" ${v?.status==='pendente'?'selected':''}>Pendente</option><option value="pago" ${v?.status==='pago'?'selected':''}>Pago</option><option value="entregue" ${v?.status==='entregue'?'selected':''}>Entregue</option><option value="cancelado" ${v?.status==='cancelado'?'selected':''}>Cancelado</option></select></div>
    <div class="form-group full"><label>Observações</label><textarea id="v-obs" rows="2">${esc(v?.observacoes||'')}</textarea></div>
  </div>
  <div style="margin:14px 0 6px;font-size:13px;font-weight:700;color:#94a3b8">Itens da Venda</div>
  <div id="v-itens"></div>
  <div style="margin-top:6px"><button class="btn-action secondary" style="padding:6px 12px;font-size:12px" onclick="addVendaItem()">+ Adicionar Item</button></div>
  <div style="text-align:right;margin-top:10px;font-size:18px;font-weight:800">Total: <span id="v-total">${fmtN(v?.total||0)}</span></div>
  <div class="modal-actions">
    <button class="btn-action secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn-action" onclick="saveVenda('${id||''}')">Salvar</button>
  </div>`;
  document.getElementById('modal-ov').style.display='flex';refreshVendaItens();
};

window.saveVenda=async(id)=>{
  const clienteId=document.getElementById('v-cli').value;
  if(!clienteId){toast('Selecione um cliente.','error');return;}
  const cliente=S.clientes.find(c=>c.id===clienteId);
  const itens=_vendaItens.filter(i=>i.produtoId&&i.qtd>0);
  if(!itens.length){toast('Adicione pelo menos um item.','error');return;}
  const total=itens.reduce((a,it)=>a+(it.qtd*it.preco),0);
  const data={clienteId,clienteNome:cliente?.nome||'',codigo:document.getElementById('v-cod').value.trim(),data:document.getElementById('v-data').value,status:document.getElementById('v-status').value,observacoes:document.getElementById('v-obs').value.trim(),itens,total,updatedAt:serverTimestamp()};
  try{if(id){await updateDoc(doc(db,'vendas',id),data);toast('Venda atualizada!');}else{data.createdAt=serverTimestamp();await addDoc(collection(db,'vendas'),data);toast('Venda registrada!');}}
  catch(e){toast(e.message,'error');return;}
  closeModal();await loadAll();if(curView==='vendas')renderVendas();else renderDash();
};
window.deleteVenda=async(id)=>{if(!confirm('Excluir esta venda?'))return;try{await deleteDoc(doc(db,'vendas',id));toast('Venda excluída.');await loadAll();if(curView==='vendas')renderVendas();else renderDash();}catch(e){toast(e.message,'error');}};

function renderRelatorios(){
  const meses={};S.vendas.forEach(v=>{if(v.status==='cancelado')return;const d=new Date(v.data);const k=`${d.getMonth()+1}/${d.getFullYear()}`;if(!meses[k])meses[k]={total:0,qtd:0};meses[k].total+=Number(v.total)||0;meses[k].qtd++;});
  const linhas=Object.entries(meses).sort((a,b)=>{const[ma,ya]=a[0].split('/');const[mb,yb]=b[0].split('/');return new Date(yb,mb-1)-new Date(ya,ma-1);}).map(([k,v])=>`<tr><td>${k}</td><td>${v.qtd}</td><td>${fmtN(v.total)}</td></tr>`).join('');
  setC(`<div class="page-title">📈 Relatórios</div><div class="page-sub">Resumo mensal de vendas</div>
    <div class="table-wrap"><table><thead><tr><th>Mês</th><th>Qtd. Vendas</th><th>Total</th></tr></thead><tbody>${linhas||'<tr><td colspan="3" class="empty">Nenhuma venda registrada.</td></tr>'}</tbody></table></div>`);
}
</script>
</body>
</html>
